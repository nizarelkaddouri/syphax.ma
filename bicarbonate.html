<style>

/* BODY */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg, #f5f5f5, #e8f0ff);
}

.menu-icon{
    position:fixed;
    top:18px;
    left:18px;
    font-size:28px;
    color:#f8f8f8;
    cursor:pointer;
    z-index:1100;
    transition:0.3s;
}

.menu-icon:hover{
    transform:scale(1.1);
    color:#1e90ff;
}

/* OVERLAY */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    opacity:0;
    visibility:hidden;
    transition:0.4s;
    z-index:999;
}

.overlay.active{
    opacity:1;
    visibility:visible;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:0;
    left:-300px;
    width:300px;
    height:100%;
    background:linear-gradient(180deg,#0a3d62,#1e90ff);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:25px 0;
    transition:0.5s ease;
    z-index:1000;
    box-shadow:5px 0 25px rgba(0,0,0,0.3);
}

.sidebar.active{
    left:0;
}

.menu-top,.menu-bottom{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
}

/* LINKS */
.sidebar a{
    width:85%;
    margin:7px 0;
    padding:12px;
    text-align:center;
    text-decoration:none;
    color:white;
    font-weight:bold;
    border-radius:15px;
    background:rgba(255,255,255,0.1);
    position:relative;
    overflow:hidden;
    transition:0.4s;
}

/* SHINE */
.sidebar a::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.25);
    transform:skewX(-25deg);
    transition:0.5s;
}

.sidebar a:hover::before{
    left:120%;
}

.sidebar a:hover{
    transform:translateX(10px) scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* HEADER */
header{
    background:linear-gradient(90deg,#0a3d62,#1e90ff);
    color:white;
    text-align:center;
    padding:30px 20px;
    position:relative;
}

/* LOGO */
.logo{
    width:110px;
    height:110px;
    object-fit:cover;
    border-radius:50%;
    display:block;
    margin:0 auto 10px auto;
    border:3px solid rgba(255,255,255,0.4);
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

header h1{
    margin:0;
    font-size:40px;
}
/* CONTAINER */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 30px;
}

/* CARD */
.card {
    background: white;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
}

/* IMAGE */
.product-img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 10px;
}

.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background:linear-gradient(135deg,#1e90ff,#00c6ff);
    color:white;
    border-radius:20px;
    text-decoration:none;
    position:relative;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(30,144,255,0.4);
}

.btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.3);
    transform:skewX(-25deg);
    transition:0.5s;
}

.btn:hover::before{ left:120%; }

.btn:hover{
    transform:scale(1.1);
}


/* CONTACT (التعديل هنا فقط) */
.contact {
    grid-column: 1 / -1;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 20px;
}

.contact a {
    margin: 8px;
    padding: 12px 18px;
    border-radius: 30px;
    color: white;
    text-decoration: none;
}

.whatsapp { background: #25D366; }
.gmail { background: #EA4335; }
.facebook { background: #1877F2; }
.instagram { background: linear-gradient(45deg,#feda75,#d62976,#962fbf); }

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    background: #0a3d62;
    color: white;
}

</style>
